services:
  # n8n 워크플로우 자동화
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # FastAPI 백엔드 서비스
  backend:
    build:
      context: ./tailor
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./tailor/.env
    volumes:
      - ./tailor:/tailor

  # Next.js 프론트엔드 서비스
  frontend:
    build:
      context: ./taylor
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./taylor/.env.local
    depends_on:
      - backend

volumes:
  n8n_data:
